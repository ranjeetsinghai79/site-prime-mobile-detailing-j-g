name: Scraper — USA_Restaurants
on:
  schedule:
    - cron: '35 8,10,12,14,16,18,20,22,0,2,4,6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: npm ci --workspace=pipeline
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: pipeline
        run: npx playwright install chromium
      - name: Install Playwright system deps
        working-directory: pipeline
        run: npx playwright install-deps chromium
      - name: Write service account
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > pipeline/service-account.json
      - name: Run scraper
        working-directory: pipeline
        env:
          SHEET_TAB:                  USA_Restaurants
          SCRAPE_TARGET:              '150'
          LEADS_SHEET_ID:             ${{ secrets.LEADS_SHEET_ID }}
          GOOGLE_AI_API_KEY:          ${{ secrets.GOOGLE_AI_API_KEY }}
          GOOGLE_PLACES_API_KEY:      ${{ secrets.GOOGLE_PLACES_API_KEY }}
          DATABASE_URL:               ${{ secrets.DATABASE_URL }}
          FIRECRAWL_URL:              https://api.firecrawl.dev
          FIRECRAWL_API_KEY:          ${{ secrets.FIRECRAWL_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_FILE: ./service-account.json
        run: timeout 18m npx tsx src/scripts/scrape-universal.ts || true
